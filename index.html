<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-..." crossorigin="anonymous">
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js "></script>
    <style>
        body {
            max-width: 1400px;
            margin: auto;
        }

        #country-info-list .label {
            font-weight: 600;
        }

        @media (max-width: 991.98px) {
            .container-fluid.h-100.card {
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .container-fluid.h-100.card>.row {
                flex: 1 1 auto;
                min-height: 0;
            }

            .container-fluid.h-100.card>.row>[class*="col-"] {
                height: 50%;
            }

            #controls {
                display: flex;
                flex-direction: column;
                min-height: 0;
                overflow: hidden;
            }

            #country-info {
                display: flex;
                flex-direction: column;
                min-height: 0;
                overflow: hidden;
            }

            #country-info-list {
                margin-bottom: 0.75rem;
            }

            #country-flag {
                display: block;
                width: 100%;
                max-width: 100%;
                height: auto;
                flex: 1 1 auto;
                min-height: 0;
                max-height: 100%;
                object-fit: contain;
                margin: 0 auto;
            }

            #globe {
                height: 100%;
                overflow: hidden;
            }

            #globe-canvas {
                width: 100%;
                height: 100% !important;
                display: block;
            }
        }
    </style>
</head>

<body class="vh-100 p-2">

    <div class="container-fluid h-100 card">
        <h1 class="text-left">Geo-trainer</h1>
        <button id="tour-btn" class="btn btn-primary w-100 mb-3">Fly to Random Country</button>
        <div class="row h-100 g-2 pb-2">

            <div class="col-lg-4">
                <div id="country-info-container" class="card p-2 h-100">
                    <div id="country-info" class="d-none">
                        <h2 id="country-name" class="h4">&nbsp</h2>
                        <ul id="country-info-list" class="list-unstyled">
                            <li><span class="label">Continent: </span><span id="continent"></span></li>
                            <li><span class="label">Region: </span><span id="region_un"></span></li>
                            <li><span class="label">Sub-region: </span><span id="subregion"></span></li>
                            <li><span class="label">Population: </span><span id="pop_est" class="value"></span></li>
                            <li><span class="label">Area: </span><span id="area" class="value"></span> km<sup>2</sup>
                            </li>
                        </ul>
                        <img id="country-flag" src="" alt="" class="card">
                    </div>
                </div>
            </div>

            <div class="col-lg-8 ">
                <div id="globe" class="card h-100">
                    <canvas id="globe-canvas" class="h-100"></canvas>
                </div>
            </div>



        </div>
    </div>

    <script type="module">
        import "./main.js";
    </script>

</body>

</html>
